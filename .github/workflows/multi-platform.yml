name: Build Geode Mod

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows
            os: windows-latest

          #- name: Android32
          #  os: ubuntu-latest
          #  target: Android32

          #- name: Android64
          #  os: ubuntu-latest
          #  target: Android64

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        with:
          bindings: geode-sdk/bindings
          bindings-ref: main
          combine: true
          target: ${{ matrix.config.target }}

  package:
    name: Package builds
    runs-on: ubuntu-latest
    needs: ["build"]

    steps:
      - uses: geode-sdk/build-geode-mod/combine@main
        id: build

      - uses: actions/upload-artifact@v4
        with:
          name: Build Output
          path: ${{ steps.build.outputs.build-output }}

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: ["package"]
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: Build Output
          path: ./output

      - name: List artifacts
        run: ls -la ./output

      - name: Resolve release metadata
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "name=${TAG}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            TAG="build-${GITHUB_RUN_NUMBER}"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "name=Build ${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: ${{ startsWith(github.ref, 'refs/tags/') }}
          files: |
            ./output/*.geode
          body: |
            Automated build of **ZCB Live** Geode mod.

            Drop the `.geode` file into your Geode `mods` folder, or install it via the in-game mod loader.

            Source commit: ${{ github.sha }}
